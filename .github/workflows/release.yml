name: Release — Publish to Maven Central

# Triggered by pushing a versioned tag, e.g. `git tag v1.1.2 && git push --tags`.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   OSSRH_USERNAME     — Sonatype OSSRH username (Maven Central)
#   OSSRH_PASSWORD     — Sonatype OSSRH user token / password
#   GPG_PRIVATE_KEY    — ASCII-armored GPG private key for Maven signing
#   GPG_PASSPHRASE     — passphrase for the GPG key

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format=long | awk '/^sec/{print $2; exit}' | cut -d/ -f2)
          echo "ORG_GRADLE_PROJECT_signing.keyId=$KEY_ID" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_PROJECT_signing.password=$GPG_PASSPHRASE" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_PROJECT_signing.secretKeyRingFile=$HOME/.gnupg/secring.gpg" >> "$GITHUB_ENV"
          # gpg 2.x doesn't write secring.gpg by default — the gradle signing
          # plugin still wants the legacy format.
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --export-secret-keys "$KEY_ID" > "$HOME/.gnupg/secring.gpg"

      - name: Bootstrap gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
        run: ./gradlew publishReleasePublicationToMavenCentralRepository --no-daemon

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Published \`${{ github.ref_name }}\` to Maven Central. See [CHANGELOG.md](CHANGELOG.md) for changes." \
            --verify-tag
